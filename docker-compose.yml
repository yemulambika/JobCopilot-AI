version: "3.8"

services:
  # ── Backend API ────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: resume-api
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - Ai-Resume-Maker/backend/.env.production
    environment:
      - NODE_ENV=production
      - PORT=5000
    volumes:
      - uploads:/app/uploads
      - ./Ai-Resume-Maker/backend/logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - resume-net

  # ── Nginx Reverse Proxy ────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: resume-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
    networks:
      - resume-net

  # ── PM2 Process Manager (alternative standalone) ────────
  # Uncomment below to run backend via PM2 instead of direct node
  # pm2-api:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile.pm2
  #   container_name: resume-pm2
  #   restart: unless-stopped
  #   ports:
  #     - "5000:5000"
  #   env_file:
  #     - Ai-Resume-Maker/backend/.env.production
  #   volumes:
  #     - uploads:/app/uploads
  #   networks:
  #     - resume-net

volumes:
  uploads:
    driver: local

networks:
  resume-net:
    driver: bridge